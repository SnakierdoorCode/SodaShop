<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SodaShop | Refreshing Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link id="favicon" rel="icon" href="https://img.icons8.com/color/48/soda-can.png">
    
    <style id="custom-css-area"></style>
    <style>
        :root {
            --primary: #ff3e5e;
            --bg: #1a1a1a;
            --bg-accent: #222222;
            --card-bg: #ffffff;
            --text: #000000;
            --card-size: 200px;
            --main-text: #ffffff;
        }

        body {
            margin: 0; 
            background-color: var(--bg);
            background-image: 
                linear-gradient(45deg, var(--bg-accent) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--bg-accent) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--bg-accent) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--bg-accent) 75%);
            background-size: 60px 60px;
            background-attachment: fixed;
            color: var(--main-text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, #ffffff0a 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: -1;
        }

        header {
            background-color: var(--primary);
            padding: 15px 40px; 
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 1000; 
            border-bottom: 5px solid #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .logo { font-family: 'Press Start 2P', cursive; font-size: 22px; text-shadow: 3px 3px 0px #000; color: white; letter-spacing: -1px; }
        .search-container input { width: 300px; padding: 12px; border: 3px solid #000; font-family: 'Inter'; font-weight: 900; outline: none; box-shadow: 4px 4px 0px #000; }
        .btn-retro { background: white; border: 3px solid #000; padding: 10px 15px; cursor: pointer; font-weight: bold; box-shadow: 4px 4px 0px #000; transition: 0.1s; font-family: 'Inter'; }
        .btn-retro:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px #000; }

        .section-header { font-family: 'Press Start 2P'; font-size: 14px; margin: 40px 40px 10px 40px; padding-left: 10px; border-left: 8px solid var(--primary); color: white; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-size), 1fr)); gap: 35px; padding: 20px 40px 40px 40px; }
        
        .game-card { background: var(--card-bg); border: 4px solid #000; padding: 10px 10px 45px 10px; position: relative; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 10px 10px 0px #000; cursor: pointer; }
        .game-card:hover { transform: rotate(-2deg) scale(1.05); z-index: 10; }
        .game-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 3px solid #000; }
        .game-name { position: absolute; bottom: 12px; left: 0; width: 100%; color: #000; font-family: 'Press Start 2P'; font-size: 9px; text-align: center; }

        .fav-btn { position: absolute; top: -15px; right: -15px; background: white; border: 4px solid #000; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; z-index: 50; display: flex; align-items: center; justify-content: center; box-shadow: 4px 4px 0px #000; }
        .fav-btn svg { fill: #ddd; width: 28px; height: 28px; transition: 0.2s; }
        .fav-btn.active svg { fill: var(--primary); }

        #settings-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(5px); }
        .island { background: #f0f0f0; width: 550px; max-height: 90vh; border: 5px solid #000; display: flex; flex-direction: column; color: #000; box-shadow: 20px 20px 0px rgba(0,0,0,0.5); }
        .island-header { background: #000; color: #fff; padding: 15px; display: flex; justify-content: space-between; font-family: 'Press Start 2P'; font-size: 10px; }
        .island-body { padding: 25px; overflow-y: auto; }
        .s-group { margin-bottom: 30px; border-bottom: 2px solid #ccc; padding-bottom: 20px; }
        .s-title { font-family: 'Press Start 2P'; font-size: 11px; margin-bottom: 12px; display: block; color: var(--primary); text-decoration: underline; }
        select, input[type="text"], textarea { width: 100%; padding: 10px; margin: 5px 0; border: 3px solid #000; font-family: 'Inter'; font-weight: 700; box-sizing: border-box; }
        .col-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; font-size: 13px; font-weight: 800; }
        input[type="color"] { border: 3px solid #000; width: 60px; height: 35px; cursor: pointer; padding: 0; background: none; }

        #drawer { position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; transition: bottom 0.6s cubic-bezier(0.85, 0, 0.15, 1); }
        #drawer.active { bottom: 0; }
        .drawer-bar { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); }
    </style>
</head>
<body>

<header>
    <div class="logo">SODASHOP</div>
    <div class="search-container"><input type="text" id="search" placeholder="SEARCH FLAVORS..." onkeyup="filterZones()"></div>
    <div style="display:flex; gap:15px;">
        <button class="btn-retro" onclick="location.reload()">↻</button>
        <button class="btn-retro" onclick="toggleSettings(true)">⚙ SETTINGS</button>
    </div>
</header>

<div id="trending-section">
    <div class="section-header">🔥 Trending Flavors</div>
    <div id="trending-grid" class="grid"></div>
</div>

<div id="all-games-section">
    <div class="section-header">🥤 All Games</div>
    <div id="container" class="grid"></div>
</div>

<div id="settings-modal">
    <div class="island">
        <div class="island-header"><span>SODA_CONFIG.EXE</span><span onclick="toggleSettings(false)" style="cursor:pointer;">[X]</span></div>
        <div class="island-body">
            <div class="s-group">
                <span class="s-title">Classic Theme</span>
                <select onchange="applyPreset(this.value)">
                    <option value="cherry">Default (Pink)</option>
                    <option value="ocean">Ocean Blue</option>
                    <option value="purple">Purple Dream</option>
                    <option value="forest">Forest Green</option>
                    <option value="sunset">Sunset Orange</option>
                    <option value="dark">Dark Mode</option>
                </select>
            </div>
            <div class="s-group">
                <span class="s-title">Theme Customizer</span>
                <div class="col-row">Primary Color <input type="color" onchange="updateVar('--primary', this.value)"></div>
                <div class="col-row">Background Color <input type="color" onchange="updateVar('--bg', this.value)"></div>
            </div>
            <div class="s-group">
                <span class="s-title">Tab Cloak</span>
                <select onchange="cloak(this.value)">
                    <option value="none">None</option>
                    <option value="classroom">Google Classroom</option>
                    <option value="clever">Clever</option>
                </select>
                <button class="btn-retro" onclick="aboutBlank()" style="width:100%; margin-top:10px;">GHOST MODE (NEW TAB)</button>
            </div>
            <div class="s-group">
                <span class="s-title">Stats</span>
                <div class="col-row">Sessions: <span id="stat-count">0</span></div>
                <div class="col-row">Uptime: <span id="stat-time">0h 00m</span></div>
            </div>
            <button class="btn-retro" style="width:100%" onclick="toggleSettings(false)">SAVE & CLOSE</button>
        </div>
    </div>
</div>

<div id="drawer">
    <div class="drawer-bar">
        <div id="zoneName" style="font-family:'Press Start 2P'; font-size:10px; color:white;">NOW SERVING...</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-retro" onclick="fullscreenZone()" style="background: #3EB489; color: white;">FULLSCREEN</button>
            <button class="btn-retro" onclick="closeZone()" style="background:#ff4444; color:white;">CLOSE</button>
        </div>
    </div>
    <iframe id="zoneFrame" src="" style="width:100%; height:100%; border:none;"></iframe>
</div>

<script>
    const container = document.getElementById('container');
    const trendingGrid = document.getElementById('trending-grid');
    const zoneViewer = document.getElementById('drawer');
    const zoneFrame = document.getElementById('zoneFrame');
    
    // UPDATED: No subfolders, looking in root directory
    const zonesURL = "https://cdn.jsdelivr.net/gh/SnakierdoorCode/SodaShop@main/database.json";
    const baseURL = "https://cdn.jsdelivr.net/gh/SnakierdoorCode/SodaShop@latest";
    
    let zones = [];
    let favs = JSON.parse(localStorage.getItem('ss_favs')) || [];
    let playCount = 0;
    let startTime = Date.now();

    async function listZones() {
        try {
            const response = await fetch(zonesURL + "?t=" + Date.now());
            if (!response.ok) throw new Error("HTTP " + response.status);
            zones = await response.json();
            displayZones(zones);
        } catch (e) { console.error("Database error:", e); }
    }

    function displayZones(data) {
        container.innerHTML = "";
        trendingGrid.innerHTML = "";
        
        data.forEach(game => {
            const isFav = favs.includes(game.id);
            const card = document.createElement("div");
            card.className = "game-card";
            card.onclick = () => openZone(game);
            
            // Clean up placeholders to point to root
            const imgPath = game.cover.replace("{COVER_URL}", baseURL).replace("/covers", "");
            
            card.innerHTML = `
                <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav(event, ${game.id})">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </button>
                <img src="${imgPath}" onerror="this.src='https://img.icons8.com/color/96/soda-can.png'">
                <div class="game-name">${game.name}</div>
            `;
            
            if (game.featured) trendingGrid.appendChild(card);
            else container.appendChild(card);
        });
        document.getElementById('trending-section').style.display = trendingGrid.innerHTML === "" ? "none" : "block";
    }

    function openZone(game) {
        playCount++;
        document.getElementById('stat-count').innerText = playCount;
        document.getElementById('zoneName').innerText = "NOW SERVING: " + game.name;
        
        // Remove "/games" from the URL path if it exists in JSON placeholders
        let finalUrl = game.url.replace("{HTML_URL}", baseURL).replace("/games", "");
        
        if (game.url.startsWith("http") && !game.url.includes("{HTML_URL}")) {
            window.open(game.url, "_blank");
        } else {
            zoneFrame.src = finalUrl;
            zoneViewer.classList.add('active');
        }
    }

    function closeZone() {
        zoneViewer.classList.remove('active');
        setTimeout(() => { zoneFrame.src = ""; }, 600);
    }

    function filterZones() {
        const query = document.getElementById('search').value.toLowerCase();
        displayZones(zones.filter(z => z.name.toLowerCase().includes(query)));
    }

    function toggleSettings(s) { document.getElementById('settings-modal').style.display = s ? 'flex' : 'none'; }
    function updateVar(p, v) { document.documentElement.style.setProperty(p, v); }
    
    function applyPreset(val) {
        const themes = {
            cherry: { p: '#ff3e5e', b: '#1a1a1a' },
            ocean: { p: '#0077ff', b: '#001a33' },
            purple: { p: '#a020f0', b: '#1a0033' },
            forest: { p: '#228b22', b: '#001a00' },
            sunset: { p: '#ff4500', b: '#221100' },
            dark: { p: '#333', b: '#000' }
        };
        updateVar('--primary', themes[val].p);
        updateVar('--bg', themes[val].b);
    }

    function cloak(v) {
        const map = { 
            classroom: ["Classes", "https://ssl.gstatic.com/classroom/favicon.png"], 
            clever: ["Clever | Portal", "https://assets.clever.com/launchpad/5450893a2e/favicon.ico"]
        };
        if(v !== 'none' && map[v]) {
            document.title = map[v][0];
            document.getElementById('favicon').href = map[v][1];
        }
    }

    function aboutBlank() {
        const win = window.open('about:blank', '_blank');
        const ifr = win.document.createElement('iframe');
        ifr.style = "width:100vw; height:100vh; border:none; position:fixed; top:0; left:0;";
        ifr.src = zoneFrame.src || window.location.href;
        win.document.body.appendChild(ifr);
    }

    function fullscreenZone() {
        if (zoneFrame.requestFullscreen) zoneFrame.requestFullscreen();
        else if (zoneFrame.webkitRequestFullscreen) zoneFrame.webkitRequestFullscreen();
    }

    function toggleFav(e, id) { 
        e.stopPropagation(); 
        const idx = favs.indexOf(id); 
        idx > -1 ? favs.splice(idx, 1) : favs.push(id); 
        localStorage.setItem('ss_favs', JSON.stringify(favs)); 
        displayZones(zones); 
    }

    setInterval(() => {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let h = Math.floor(diff / 3600);
        let m = Math.floor((diff % 3600) / 60);
        document.getElementById('stat-time').innerText = h + "h " + (m < 10 ? "0" + m : m) + "m";
    }, 10000);

    window.addEventListener('keydown', (e) => {
        if (e.key === '`') window.location.replace("https://classroom.google.com");
    });

    listZones();
</script>
</body>
</html>
