<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bowmasters | SodaShop</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui"/>
    
    <base href="https://cdn.jsdelivr.net/gh/SnakierdoorCode/youtube-playables@main/bowmasters/">
    <link rel="stylesheet" type="text/css" href="style/index.css">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #game { width: 100vw; height: 100vh; }
    </style>

    <script>
        /**
         * 🛡️ THE BULLETPROOF SDK BRIDGE
         * Expanded to handle the onPause and onResume listeners.
         */
        window.ytgame = window.ytgame || {};
        
        window.ytgame.system = {
            isAudioEnabled: function() { return true; },
            getLanguage: function() { return "en-US"; },
            // FIX: Added the pause/resume/audio/language listeners
            onAudioEnabledChange: function(cb) { console.log("SDK: Audio listener attached"); },
            onPause: function(cb) { console.log("SDK: Pause listener attached"); },
            onResume: function(cb) { console.log("SDK: Resume listener attached"); },
            onLanguageChange: function(cb) { console.log("SDK: Language listener attached"); }
        };

        window.ytgame.engagement = {
            sendState: function() { return Promise.resolve(); }
        };

        window.ytgame.game = {
            firstClick: function() { console.log("SDK: First Click"); },
            gameReady: function() { console.log("SDK: Game Ready"); },
            loadFinished: function() { console.log("SDK: Load Finished"); },
            firstFrameReady: function() { console.log("SDK: First Frame Ready"); },
            loadData: function() { return Promise.resolve("{}"); },
            saveData: function() { return Promise.resolve(); },
            logError: function(err) { console.error("SDK Error:", err); },
            gamePause: function() { },
            gameResume: function() { },
            getCloudData: function() { return "{}"; },
            setCloudData: function() { return Promise.resolve(); }
        };

        // 🛠️ POSTMESSAGE SHIM
        const originalPostMessage = window.postMessage;
        window.postMessage = function(message, targetOrigin, transfer) {
            if (!targetOrigin || targetOrigin === "") targetOrigin = "*";
            originalPostMessage.call(window, message, targetOrigin, transfer);
        };
    </script>

    <script src="https://cdn.jsdelivr.net/gh/SnakierdoorCode/youtube-playables@main/ytgame.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/SnakierdoorCode/youtube-playables@main/bowmasters/game.js"></script>

    <script>
        window.addEventListener("load", function() {
            if (window.runGame) {
                try {
                    window.runGame();
                } catch (e) {
                    console.error("Game crash on startup:", e);
                }
            }
        });
    </script>
</head>
<body>
    <div id="game"></div>
</body>
</html>
